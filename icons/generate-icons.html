<!DOCTYPE html>
<html>
<head>
  <title>Generate Icons</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    canvas { border: 1px solid #ccc; margin: 10px; }
    button { margin: 10px; padding: 10px 20px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>Generate Plugin Icons</h1>
  <p>Click buttons to download icons</p>

  <div>
    <canvas id="icon16" width="16" height="16"></canvas>
    <button onclick="download('icon16', 16)">Download 16x16</button>
  </div>

  <div>
    <canvas id="icon48" width="48" height="48"></canvas>
    <button onclick="download('icon48', 48)">Download 48x48</button>
  </div>

  <div>
    <canvas id="icon128" width="128" height="128"></canvas>
    <button onclick="download('icon128', 128)">Download 128x128</button>
  </div>

  <script>
    function drawIcon(canvasId, size) {
      const canvas = document.getElementById(canvasId);
      const ctx = canvas.getContext('2d');

      // Background gradient (same as original icon)
      const gradient = ctx.createLinearGradient(0, 0, size, size);
      gradient.addColorStop(0, '#4A4DE4');
      gradient.addColorStop(1, '#0BAFE5');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, size, size);

      // Border radius (simulate rounded corners)
      ctx.globalCompositeOperation = 'destination-in';
      ctx.beginPath();
      const radius = size * 0.2;
      ctx.roundRect(0, 0, size, size, radius);
      ctx.fill();
      ctx.globalCompositeOperation = 'source-over';

      // Text "A→文" - 分开绘制，箭头更小
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      const mainFontSize = size * 0.32;
      const arrowFontSize = size * 0.2;
      const centerY = size / 2 + size * 0.02;

      // 计算每个字符的位置
      const spacing = size * 0.04;
      const char1Width = mainFontSize * 0.7;  // A 的近似宽度
      const char2Width = arrowFontSize * 0.8; // → 的近似宽度
      const char3Width = mainFontSize * 0.9;  // 文 的近似宽度
      const totalWidth = char1Width + spacing + char2Width + spacing + char3Width;
      const startX = (size - totalWidth) / 2 + char1Width / 2;

      // 绘制 "A"
      ctx.fillStyle = '#ffffff';
      ctx.font = `bold ${mainFontSize}px "Microsoft YaHei", "PingFang SC", "SimHei", sans-serif`;
      ctx.fillText('A', startX, centerY);

      // 绘制 "→" (更小)
      ctx.font = `${arrowFontSize}px "Microsoft YaHei", "PingFang SC", "SimHei", sans-serif`;
      ctx.fillText('→', startX + char1Width / 2 + spacing + char2Width / 2, centerY);

      // 绘制 "文"
      ctx.font = `bold ${mainFontSize}px "Microsoft YaHei", "PingFang SC", "SimHei", sans-serif`;
      ctx.fillText('文', startX + char1Width / 2 + spacing + char2Width + spacing + char3Width / 2, centerY);
    }

    function download(canvasId, size) {
      const canvas = document.getElementById(canvasId);
      const link = document.createElement('a');
      link.download = `icon${size}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    }

    // Draw all icons on load
    drawIcon('icon16', 16);
    drawIcon('icon48', 48);
    drawIcon('icon128', 128);
  </script>
</body>
</html>
